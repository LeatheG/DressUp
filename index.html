<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="images4/icon.png" type="image/png" />

  <body>
    <div id="sceneBackground"></div>
    <h1 id="gameTitle">Glam Girl Dress-Up</h1>
    <div id="box">
      <div id="backdrop">
        <div id="face"></div>
        <div id="shirt"></div>
        <div id="hair"></div>
        <div id="girl"></div>
        <div id="shoes"></div>
        <div id="bottoms"></div>
        <div id="skin"></div>
        <div id="bangs"></div>
      </div>
<div class="listofoptions">

  <div class="optionGrid five">
    <button class="itemBtn bangsBtn bangs1Preview" onclick="setbangs(1)">
      <img src="./images4/bangs1.png">

    <button class="itemBtn bangsBtn bangs2Preview" onclick="setbangs(2)">
      <img src="./images4/bangs2.png">
    </button>

    <button class="itemBtn bangsBtn bangs3Preview" onclick="setbangs(3)">
      <img src="./images4/bangs3.png">
    </button>

    <button class="itemBtn bangsBtn bangs4Preview" onclick="setbangs(4)">
      <img src="./images4/bangs4.png">
    </button>

    <button class="itemBtn bangsBtn bangs5Preview" onclick="setbangs(5)">
      <img src="./images4/bangs5.png">
    </button>
  </div>
</section>

<section class="optionCard">
  <h3 class="sectionTitle">HAIR</h3>

  <div class="optionGrid five">
    <button class="itemBtn hairBtn hair1Preview" onclick="sethair(1)">
      <img src="./images4/hair0.png">
    </button>

    <button class="itemBtn hairBtn hair2Preview" onclick="sethair(2)">

    </button>

    <button class="itemBtn hairBtn hair3Preview" onclick="sethair(3)">
      <img src="./images4/hair2.PNG">
    </button>

    <button class="itemBtn hairBtn hair4Preview" onclick="sethair(4)">
      <img src="./images4/hair3.png">
    </button>

    <button class="itemBtn hairBtn hair5Preview" onclick="sethair(5)">
      <img src="./images4/hair4.png">
    </button>
  </div>
</section>

<section class="optionCard">
  <h3 class="sectionTitle">SHIRT</h3>
  <div class="optionGrid five">
    <button class="itemBtn shirtBtn" onclick="setshirt(1)"><img src="./images4/shirt1.PNG"></button>
   <button class="itemBtn shirtBtn smallShirt" onclick="setshirt(2)"><img src="./images4/shirt2.PNG"></button>
    <button class="itemBtn shirtBtn" onclick="setshirt(3)"><img src="./images4/shirt3.PNG"></button>
    <button class="itemBtn shirtBtn" onclick="setshirt(4)"><img src="./images4/shirt4.PNG"></button>
    <button class="itemBtn shirtBtn" onclick="setshirt(5)"><img src="./images4/shirt5.PNG"></button>
  </div>
</section>

<section class="optionCard">
  <h3 class="sectionTitle">BOTTOMS</h3>

  <div class="optionGrid five">
    <button class="itemBtn bottomsBtn pantsStyle1" onclick="setbottoms(1)">
      <img src="./images4/bottoms1.png">
    </button>

    <button class="itemBtn bottomsBtn pantsStyle1" onclick="setbottoms(2)">
      <img src="./images4/bottoms2.png">
    </button>

    <button class="itemBtn bottomsBtn pantsStyle2" onclick="setbottoms(3)">
      <img src="./images4/bottoms3.png">
    </button>

    <button class="itemBtn bottomsBtn pantsStyle3" onclick="setbottoms(4)">
      <img src="./images4/bottoms4.png">
    </button>

    <button class="itemBtn bottomsBtn pantsStyle4" onclick="setbottoms(5)">
      <img src="./images4/bottoms5.png">

    <button class="itemBtn shoesBtn bigShoe" onclick="setshoes(1)">
      <img src="./images4/shoes1.png">

      <img src="./images4/shoes2.PNG">
    </button>

    <button class="itemBtn shoesBtn" onclick="setshoes(3)">
      <img src="./images4/shoes3.png">
    </button>

    <button class="itemBtn shoesBtn mediumShoe" onclick="setshoes(4)">

    </button>

    <button class="itemBtn shoesBtn" onclick="setshoes(5)">
      <img src="./images4/shoes5.PNG">
    </button>
  </div>
</section>

<section class="optionCard">

  <div class="optionGrid six">
    <button class="itemBtn faceBtn" onclick="setface(1)"><img src="./images4/face1.png"></button>
    <button class="itemBtn faceBtn" onclick="setface(2)"><img src="./images4/face2.png"></button>

</section>

<section class="optionCard skinCard">

    <button class="itemBtn skinBtn" onclick="setskin(1)"><img src="./images4/skin1.png"></button>
    <button class="itemBtn skinBtn" onclick="setskin(2)"><img src="./images4/skin2.PNG"></button>
    <button class="itemBtn skinBtn" onclick="setskin(3)"><img src="./images4/skin3.PNG"></button>
    <button class="itemBtn skinBtn" onclick="setskin(4)"><img src="./images4/skin4.PNG"></button>
    <button class="itemBtn skinBtn" onclick="setskin(5)"><img src="./images4/skin5.PNG"></button>
    <button class="itemBtn skinBtn" onclick="setskin(6)"><img src="./images4/skin6.PNG"></button>
  </div>

</div>
