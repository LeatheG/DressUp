<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title></title>
  </head>
  <body>
    <h1 id="heading"></h1>
    <div id="box">
      <div id="backdrop">
        <div id="face"></div>
        <div id="shirt"></div>
        <div id="hair"></div>
        <div id="girl"></div>
        <div id="shoes"></div>
        <div id="bottoms"></div>
      </div>
      <div class="buttonBox">
        <button id="nexthair" onclick="nexthair()">hair➡</button>
        <button id="nextbottoms" onclick="nextbottoms()">bottoms➡</button>
        <button id="nextshoes" onclick="nextshoes()">shoes➡</button>
        <button id="nextshirt" onclick="nextshirt()">shirt➡</button>
        <button id="nextface" onclick="nextface()">face➡</button>
      </div>

      <div id="shirtCarousel" aria-label="Shirt preview carousel">
        <div class="shirtPreviewCard" id="shirtPrevCard">
          <span class="previewLabel">Previous</span>
          <img id="shirtPrevImg" alt="Previous shirt option" />
          <span class="previewName" id="shirtPrevName"></span>
        </div>
        <div class="shirtPreviewCard current" id="shirtCurrentCard">
          <span class="previewLabel">Current</span>
          <img id="shirtCurrentImg" alt="Current shirt option" />
          <span class="previewName" id="shirtCurrentName"></span>
        </div>
        <div class="shirtPreviewCard" id="shirtNextCard">
          <span class="previewLabel">Next</span>
          <img id="shirtNextImg" alt="Next shirt option" />
          <span class="previewName" id="shirtNextName"></span>
        </div>

        
      </div>
      <!-- We can put our github links here!
      <div id="linksBox">
        <a href="https://www.instagram.com/the_lonelymoongirl/"
          ><img src="./images4/insta2.png" alt="insta" height="50px"
        /></a>
        <a href="https://www.amazon.co.uk/Lonely-Moongirl-Hazie/dp/1699887489"
          ><img src="./images4/amazon.jpg" height="50px"
        /></a>
      </div>-->
    </div>
    <script src="./main.js"></script>
  </body>
</html>
