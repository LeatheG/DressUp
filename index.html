<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title></title>
  </head>
  <body>
    <h1 id="heading"></h1>
    <div id="box">
      <div id="backdrop">
        <div id="face"></div>
        <div id="shirt"></div>
        <div id="hair"></div>
        <div id="girl"></div>
        <div id="shoes"></div>
        <div id="bottoms"></div>
        <div id="skin"></div>
        <div id="bangs"></div>
      </div>
<div class="listofoptions">

<!--BANGS-->
  <h3 class="sectionTitle">BANGS</h3>
<div class="buttonBoxbangs">
  <div class="carouselRow bangsRow">
    <button class="sideBtn bangsSideBtn" onclick="prevbangs()">◀</button>

    <div id="bangsCarousel">
      <div class="bangsPreviewCard" id="bangsFarPrevCard">
        <img id="bangsFarPrevImg" />
      </div>

      <div class="bangsPreviewCard" id="bangsPrevCard">
        <img id="bangsPrevImg" />
      </div>

      <div class="bangsPreviewCard current" id="bangsCurrentCard">
        <img id="bangsCurrentImg" />
      </div>

      <div class="bangsPreviewCard" id="bangsNextCard">
        <img id="bangsNextImg" />
      </div>

      <div class="bangsPreviewCard" id="bangsFarNextCard">
        <img id="bangsFarNextImg" />
      </div>
    </div>

    <button class="sideBtn bangsSideBtn" onclick="nextbangs()">▶</button>
  </div>
</div>

<!--HAIR-->
  <h3 class="sectionTitle">HAIR</h3>
<div class="buttonBoxhair">
  <div class="carouselRow hairRow">
    <button class="sideBtn hairSideBtn" onclick="prevhair()">◀</button>

    <div id="hairCarousel">
      <div class="hairPreviewCard" id="hairFarPrevCard">
        <img id="hairFarPrevImg" />
      </div>

      <div class="hairPreviewCard" id="hairPrevCard">
        <img id="hairPrevImg" />
      </div>

      <div class="hairPreviewCard current" id="hairCurrentCard">
        <img id="hairCurrentImg" />
      </div>

      <div class="hairPreviewCard" id="hairNextCard">
        <img id="hairNextImg" />
      </div>

      <div class="hairPreviewCard" id="hairFarNextCard">
        <img id="hairFarNextImg" />
      </div>
    </div>

    <button class="sideBtn hairSideBtn" onclick="nexthair()">▶</button>
  </div>
</div>

<!--SHIRT-->
  <h3 class="sectionTitle">SHIRT</h3>
<div class="buttonBoxshirt">
  <div class="carouselRow shirtRow">
    <button class="sideBtn shirtSideBtn" onclick="prevshirt()">◀</button>

    <div id="shirtCarousel">
      <div class="shirtPreviewCard" id="shirtFarPrevCard">
        <img id="shirtFarPrevImg" />
      </div>

      <div class="shirtPreviewCard" id="shirtPrevCard">
        <img id="shirtPrevImg" />
      </div>

      <div class="shirtPreviewCard current" id="shirtCurrentCard">
        <img id="shirtCurrentImg" />
      </div>

      <div class="shirtPreviewCard" id="shirtNextCard">
        <img id="shirtNextImg" />
      </div>

      <div class="shirtPreviewCard" id="shirtFarNextCard">
        <img id="shirtFarNextImg" />
      </div>
    </div>

    <button class="sideBtn shirtSideBtn" onclick="nextshirt()">▶</button>
  </div>
</div>

<!--BOTTOMS-->
  <h3 class="sectionTitle">BOTTOMS</h3>
<div class="buttonBoxbottoms">
  <div class="carouselRow bottomsRow">
    <button class="sideBtn bottomsSideBtn" onclick="prevbottoms()">◀</button>

    <div id="bottomsCarousel">
      <div class="bottomsPreviewCard" id="bottomsFarPrevCard">
        <img id="bottomsFarPrevImg" />
      </div>

      <div class="bottomsPreviewCard" id="bottomsPrevCard">
        <img id="bottomsPrevImg" />
      </div>

      <div class="bottomsPreviewCard current" id="bottomsCurrentCard">
        <img id="bottomsCurrentImg" />
      </div>

      <div class="bottomsPreviewCard" id="bottomsNextCard">
        <img id="bottomsNextImg" />
      </div>

      <div class="bottomsPreviewCard" id="bottomsFarNextCard">
        <img id="bottomsFarNextImg" />
      </div>
    </div>

    <button class="sideBtn bottomsSideBtn" onclick="nextbottoms()">▶</button>
  </div>
</div>

<!--SHOES-->
  <h3 class="sectionTitle">SHOES</h3>
<div class="buttonBoxshoes">
  <div class="carouselRow shoesRow">
    <button class="sideBtn shoesSideBtn" onclick="prevshoes()">◀</button>

    <div id="shoesCarousel">
      <div class="shoesPreviewCard" id="shoesPrevCard">
        <img id="shoesPrevImg" />
      </div>

      <div class="shoesPreviewCard current" id="shoesCurrentCard">
        <img id="shoesCurrentImg" />
      </div>

      <div class="shoesPreviewCard" id="shoesNextCard">
        <img id="shoesNextImg" />
      </div>
    </div>

    <button class="sideBtn shoesSideBtn" onclick="nextshoes()">▶</button>
  </div>
</div>

<!--FACE-->
<div class="buttonBoxface">
  <h3 class="sectionTitle">FACE</h3>

  <div id="faceOptionsRow">
    <button class="faceBtn" onclick="setface(1)">
      <img src="./images4/face1.png" alt="Face 1" />
    </button>

    <button class="faceBtn" onclick="setface(2)">
      <img src="./images4/face2.png" alt="Face 2" />
    </button>

    <button class="faceBtn" onclick="setface(3)">
      <img src="./images4/face3.png" alt="Face 3" />
    </button>

    <button class="faceBtn" onclick="setface(4)">
      <img src="./images4/face4.PNG" alt="Face 4" />
    </button>

    <button class="faceBtn" onclick="setface(5)">
      <img src="./images4/face5.PNG" alt="Face 5" />
    </button>

    <button class="faceBtn" onclick="setface(6)">
      <img src="./images4/face6.PNG" alt="Face 6" />
    </button>
  </div>
</div>

<!--SKIN COLOR-->
<div class="buttonBoxskin">
  <h3 class="sectionTitle">SKIN</h3>

  <div id="skinOptionsRow">
    <button class="skinBtn" onclick="setskin(1)">
      <img src="./images4/skin1.png" alt="Skin 1" />
    </button>

    <button class="skinBtn" onclick="setskin(2)">
      <img src="./images4/skin2.PNG" alt="Skin 2" />
    </button>

    <button class="skinBtn" onclick="setskin(3)">
      <img src="./images4/skin3.PNG" alt="Skin 3" />
    </button>

    <button class="skinBtn" onclick="setskin(4)">
      <img src="./images4/skin4.PNG" alt="Skin 4" />
    </button>

    <button class="skinBtn" onclick="setskin(5)">
      <img src="./images4/skin5.PNG" alt="Skin 5" />
    </button>

    <button class="skinBtn" onclick="setskin(6)">
      <img src="./images4/skin6.PNG" alt="Skin 6" />
    </button>
  </div>
</div>
     
<!-- MUSIC BUTTON -->
<div id="musicPlayer" onclick="toggleMusic()">
  <img id="recordIcon" src="./images4/recordmute.png" alt="music toggle" />
</div>

<!-- AUDIO (ADD YOUR FILE HERE) -->
<audio id="bgMusic" loop>
  <!-- 🔥 PUT YOUR MUSIC FILE HERE -->
  <!-- Example: <source src="./music/song.mp3" type="audio/mpeg"> -->
</audio>

    </div>
    <script src="./main.js"></script>
  </body>
</html>
